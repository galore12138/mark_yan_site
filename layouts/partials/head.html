<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}</title>
  <meta name="description" content="{{ site.Params.description }}">
  <meta name="author" content="{{ site.Params.author }}">
  <meta name="robots" content="index, follow">
  {{ with site.Params.keywords }}<meta name="keywords" content="{{ delimit . ", " }}">{{ end }}
  <link rel="canonical" href="{{ .Permalink }}">
  <meta property="og:type" content="{{ if .IsHome }}profile{{ else }}article{{ end }}">
  <meta property="og:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}">
  <meta property="og:description" content="{{ site.Params.description }}">
  <meta property="og:url" content="{{ .Permalink }}">
  <meta property="og:image" content="{{ site.Params.photo | absURL }}">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="{{ if .IsHome }}{{ site.Title }}{{ else }}{{ .Title }} | {{ site.Title }}{{ end }}">
  <meta name="twitter:description" content="{{ site.Params.description }}">
  <meta name="twitter:image" content="{{ site.Params.photo | absURL }}">
  {{ if .IsHome }}
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "Person",
    "name": "Mark (Yuzhi) Yan",
    "alternateName": ["Mark Yan", "Yuzhi Yan", "Mark Yuzhi Yan"],
    "url": "{{ site.BaseURL }}",
    "image": "{{ site.Params.photo | absURL }}",
    "jobTitle": "{{ site.Params.role }}",
    "worksFor": {
      "@type": "CollegeOrUniversity",
      "name": "{{ site.Params.university }}"
    },
    "affiliation": {
      "@type": "CollegeOrUniversity",
      "name": "{{ site.Params.university }}"
    },
    "email": "mailto:{{ site.Params.email }}",
    "address": "{{ site.Params.department }}, {{ site.Params.school }}, {{ site.Params.university }}, {{ site.Params.address }}",
    "knowsAbout": [{{ range $i, $keyword := site.Params.keywords }}{{ if $i }}, {{ end }}"{{ $keyword }}"{{ end }}],
    "sameAs": [{{ range $i, $url := site.Params.sameAs }}{{ if $i }}, {{ end }}"{{ $url }}"{{ end }}]
  }
  </script>
  {{ end }}
  <link rel="icon" href="{{ "favicon.ico" | relURL }}">
  <link rel="icon" type="image/png" sizes="32x32" href="{{ "favicon-32x32.png" | relURL }}">
  <link rel="apple-touch-icon" href="{{ "apple-touch-icon.png" | relURL }}">
  {{ $css := resources.Get "css/style.css" | minify | fingerprint }}
  <link rel="stylesheet" href="{{ $css.RelPermalink }}">
</head>
